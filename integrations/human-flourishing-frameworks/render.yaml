services:
  - type: web
    name: human-flourishing-frameworks
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    domains:
      - human-flourishing-frameworks.onrender.com
