name: tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Compile key modules and tests
        run: |
          python -m py_compile \
            world_model.py \
            live_observation_telemetry.py \
            live_sensors.py \
            bio_threat_source_registry.py \
            polymorphic_seed_registry.py \
            tests/test_confidence_lifecycle.py \
            tests/test_live_observation_telemetry.py \
            tests/test_live_sensors_telemetry_wiring.py \
            tests/test_live_polling_readiness_doc.py \
            tests/test_bio_threat_source_registry.py \
            tests/test_polymorphic_seed_registry.py

      - name: Run focused unittest discovery
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m unittest discover -s tests -t . -p "test_*.py"
