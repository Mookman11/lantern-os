name: convergence-validation

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    name: Run convergence guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Show Python version
        run: python --version

      - name: Validate theorem register guardrails
        run: python -m unittest discover -s tests -p "test_theorem_register.py" -t .

      - name: Validate schema, source-class, and lore guardrails
        run: python -m unittest discover -s tests -p "test_schema_source_lore.py" -t .

      - name: Validate recovery artifacts
        run: python -m unittest discover -s tests -p "test_recovery_artifacts.py" -t .

      - name: Validate CI workflow guardrails
        run: python -m unittest discover -s tests -p "test_ci_workflow.py" -t .

      - name: Validate release hardening artifacts
        run: python -m unittest discover -s tests -p "test_release_artifacts.py" -t .

      - name: Validate release bundle builder
        run: python -m unittest discover -s tests -p "test_release_bundle.py" -t .

      - name: Validate restore drill runner
        run: python -m unittest discover -s tests -p "test_restore_drill.py" -t .

      - name: Validate wish anchor guardrails
        run: python -m unittest discover -s tests -p "test_wish_anchor.py" -t .

      - name: Validate public-readiness documentation guardrails
        run: python -m unittest discover -s tests -p "test_public_readiness_docs.py" -t .

      - name: Validate seven-anchors self-correction guardrails
        run: python -m unittest discover -s tests -p "test_seven_anchors_self_correction.py" -t .
