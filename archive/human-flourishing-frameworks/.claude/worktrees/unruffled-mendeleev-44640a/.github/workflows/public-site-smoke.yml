name: public-site-smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  public-site-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check public Render page for unsafe authority copy
        run: |
          set -euo pipefail
          URL="https://human-flourishing-frameworks.onrender.com/"
          body="$(curl -fsSL --retry 3 --retry-delay 10 --max-time 30 "$URL")"
          printf '%s' "$body" | grep -q "Human Flourishing Frameworks"
          if printf '%s' "$body" | grep -E "ALGORITHMIC GOVERNANCE|No human board|irreversible after a 24-hour lock"; then
            echo "Unsafe public authority copy is still visible on $URL" >&2
            exit 1
          fi
          printf '%s' "$body" | grep -q "EXPERIMENTAL ADVISORY AGENTS"

      - name: Check health endpoint
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 10 --max-time 30 \
            https://human-flourishing-frameworks.onrender.com/health

      - name: Check status endpoint
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 10 --max-time 30 \
            https://human-flourishing-frameworks.onrender.com/api/status \
            | python -m json.tool >/dev/null
