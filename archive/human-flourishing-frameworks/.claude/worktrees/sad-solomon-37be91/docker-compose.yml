version: '3.8'

services:
  hff-node:
    build: .
    container_name: human-flourishing-node
    ports:
      - "5000:5000"
    environment:
      - NODE_NAME=docker-node
      - PLATFORM=docker
      - NODE_REGION=unspecified
      - OPERATOR_TYPE=independent
      - DEPLOYMENT_TYPE=docker
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; json.load(urllib.request.urlopen('http://localhost:5000/health', timeout=5))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
