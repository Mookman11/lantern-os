name: restore-drill

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  restore-drill:
    name: Run release bundle restore drill
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run restore drill
        run: python tools/run_restore_drill.py --output-dir dist

      - name: List restore drill output
        run: find dist -maxdepth 2 -type f -print | sort

      - name: Upload restore drill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hff-convergence-v0.1-restore-drill
          path: |
            dist/hff-convergence-v0.1.zip
            dist/hff-convergence-v0.1/CHECKSUMS.sha256
            dist/RESTORE_DRILL_REPORT.md
          if-no-files-found: error
          retention-days: 30
