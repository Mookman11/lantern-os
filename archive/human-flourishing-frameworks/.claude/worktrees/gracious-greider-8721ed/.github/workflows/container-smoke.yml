name: container-smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          set -euo pipefail
          docker build -t hff-smoke:latest .

      - name: Run Docker container
        run: |
          set -euo pipefail
          docker run -d --rm --name hff-smoke -p 5000:5000 -e PORT=5000 hff-smoke:latest
          for i in $(seq 1 30); do
            if curl -fsSL http://127.0.0.1:5000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs hff-smoke
          exit 1

      - name: Smoke-check public dashboard copy in container
        run: |
          set -euo pipefail
          body="$(curl -fsSL http://127.0.0.1:5000/)"
          printf '%s' "$body" | grep -q "Human Flourishing Frameworks"
          if printf '%s' "$body" | grep -E "ALGORITHMIC GOVERNANCE|No human board|irreversible after a 24-hour lock"; then
            echo "Unsafe public authority copy appears in container-rendered dashboard" >&2
            exit 1
          fi
          printf '%s' "$body" | grep -q "EXPERIMENTAL ADVISORY AGENTS"
          printf '%s' "$body" | grep -q "Escalations are review records only unless explicitly authorized by an operator"

      - name: Smoke-check API endpoints in container
        run: |
          set -euo pipefail
          curl -fsSL http://127.0.0.1:5000/health
          curl -fsSL http://127.0.0.1:5000/api/status | python -m json.tool >/dev/null

      - name: Show container logs
        if: always()
        run: |
          docker logs hff-smoke || true
