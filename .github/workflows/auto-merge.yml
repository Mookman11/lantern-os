name: Auto-merge

# Opt-in, best-fit zipper merger with self-healing. The repo has no branch
# protection, so this workflow enforces "all checks green + mergeable" itself
# before merging.
#
# How to use: add the `auto-merge` label to PRs. The workflow walks labeled,
# non-draft PRs targeting the default branch in ASCENDING number order and merges
# the lowest-numbered one that is fully ready (mergeable + all checks green),
# one per run. It does NOT freeze on a stuck PR: if a PR is conflicting or has a
# failing check it is SKIPPED so later ready PRs can still land ("best fit").
#
# SELF-HEALING: when a PR is skipped for a conflict or a failing check, the
# workflow files an AUTO-WORK TASK (POST task_intake to the Lantern MCP endpoint)
# describing exactly what to fix, and labels the PR `auto-fix-queued` so it isn't
# re-filed every pass. A task consumer / agent picks it up, pushes a fix to the
# PR branch, and the zipper merges it once green. Best-effort: if the MCP endpoint
# is unreachable the workflow still proceeds (it retries next pass once the label
# is removed). Endpoint configurable via the `MCP_ENDPOINT` repo variable.

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch: {}
  pull_request_target:
    types: [labeled, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  zipper:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      BASE: ${{ github.event.repository.default_branch }}
      MCP_ENDPOINT: ${{ vars.MCP_ENDPOINT || 'https://mcp.lantern-os.net/mcp' }}
    steps:
      - name: Clear stale auto-fix-queued label on a new push (lets the loop re-file)
        if: github.event_name == 'pull_request_target' && github.event.action == 'synchronize'
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" --repo "$REPO" \
            --remove-label auto-fix-queued >/dev/null 2>&1 || true

      - name: Zipper-merge ready PRs; file auto-work tasks for blocked ones
        run: |
          set -uo pipefail
          BASE="${BASE:-master}"

          # File an auto-work task for a blocked PR (idempotent via the
          # `auto-fix-queued` label). Best-effort: never fails the workflow.
          file_autowork_task() {
            local n="$1" kind="$2" detail="$3" branch="$4"
            if gh pr view "$n" --repo "$REPO" --json labels --jq '.labels[].name' 2>/dev/null \
                 | grep -qx 'auto-fix-queued'; then
              echo "auto-work task already filed for #$n — not re-filing."
              return 0
            fi
            local desc="Auto-work: fix PR #$n (branch \`$branch\`) in $REPO so it can auto-merge. Blocker — $kind: $detail. Check out the branch, fix until all checks pass and there are no conflicts with \`$BASE\`, then commit and push to the PR branch. The auto-merge zipper will land it once green."
            local payload
            payload=$(jq -nc --arg d "$desc" \
              '{jsonrpc:"2.0",id:1,method:"tools/call",params:{name:"task_intake",arguments:{description:$d,priority:"high"}}}')
            if curl -fsS -m 20 -X POST "$MCP_ENDPOINT" \
                 -H "Content-Type: application/json" -d "$payload" >/dev/null 2>&1; then
              gh pr edit "$n" --repo "$REPO" --add-label auto-fix-queued >/dev/null 2>&1 || true
              gh pr comment "$n" --repo "$REPO" \
                --body "🤖 auto-merge: filed an auto-work task to fix the blocker ($kind: $detail). It'll merge automatically once green." >/dev/null 2>&1 || true
              echo "Filed auto-work task for #$n."
            else
              echo "MCP endpoint unreachable ($MCP_ENDPOINT) — couldn't file task for #$n; will retry next pass."
            fi
          }

          mapfile -t PRS < <(gh pr list --repo "$REPO" --state open --label auto-merge \
            --base "$BASE" --json number,isDraft \
            --jq 'map(select(.isDraft==false)) | sort_by(.number) | .[].number')
          if [ "${#PRS[@]}" -eq 0 ]; then echo "No auto-merge PRs queued."; exit 0; fi
          echo "Zipper queue (ascending): ${PRS[*]}"

          for n in "${PRS[@]}"; do
            echo "::group::Evaluate PR #$n"
            read -r mergeable mstate branch < <(gh pr view "$n" --repo "$REPO" \
              --json mergeable,mergeStateStatus,headRefName \
              --jq '"\(.mergeable) \(.mergeStateStatus) \(.headRefName)"')
            echo "mergeable=$mergeable mergeState=$mstate branch=$branch"

            if [ "$mergeable" = "CONFLICTING" ]; then
              echo "Conflict on #$n — file fix task, skip."
              file_autowork_task "$n" "conflict" "merge conflict with \`$BASE\`" "$branch"
              echo "::endgroup::"; continue
            fi

            if [ "$mstate" = "BEHIND" ]; then
              echo "Behind $BASE — updating branch of #$n to re-trigger checks."
              gh pr update-branch "$n" --repo "$REPO" >/dev/null 2>&1 || echo "update-branch failed (maintainer edits may be off)"
              echo "::endgroup::"; continue
            fi

            states=$(gh pr checks "$n" --repo "$REPO" --json state --jq '.[].state' 2>/dev/null || true)
            if printf '%s\n' "$states" | grep -qiE 'FAILURE|ERROR|CANCELLED|TIMED_OUT|ACTION_REQUIRED|STARTUP_FAILURE'; then
              fails=$(gh pr checks "$n" --repo "$REPO" --json name,state \
                --jq '[.[]|select(.state=="FAILURE")|.name]|unique|join(", ")' 2>/dev/null || echo "unknown")
              echo "Failing checks on #$n ($fails) — file fix task, skip."
              file_autowork_task "$n" "failing checks" "$fails" "$branch"
              echo "::endgroup::"; continue
            fi
            if printf '%s\n' "$states" | grep -qiE 'PENDING|QUEUED|IN_PROGRESS|EXPECTED|WAITING'; then
              echo "Checks still running — skip #$n this pass."; echo "::endgroup::"; continue
            fi

            echo "Ready — merging #$n (squash)."
            if gh pr merge "$n" --repo "$REPO" --squash --delete-branch; then
              echo "Merged #$n. Schedule will advance the zipper."
              echo "::endgroup::"; exit 0
            else
              echo "Merge call failed for #$n — skip, try next."; echo "::endgroup::"; continue
            fi
          done
          echo "No PR was ready to merge this pass."
