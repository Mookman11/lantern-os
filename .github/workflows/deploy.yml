name: Deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-aws:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment prerequisites
        run: |
          echo "Checking Dockerfile..."
          test -f apps/lantern-garage/Dockerfile || (echo "Dockerfile missing" && exit 1)
          echo "✓ Dockerfile present"

          echo "Checking package.json..."
          test -f apps/lantern-garage/package.json || (echo "package.json missing" && exit 1)
          echo "✓ package.json present"

          echo "Checking health endpoint exists..."
          grep -r "/api/health" apps/lantern-garage/ > /dev/null || echo "⚠ /api/health not found in code"
          echo "✓ Deployment prerequisites verified"

      - name: Build Docker image
        run: |
          echo "[1/4] Building Docker image for lantern-garage..."
          docker build -f apps/lantern-garage/Dockerfile \
            -t lantern-garage:latest \
            -t 528081867536.dkr.ecr.us-east-1.amazonaws.com/lantern-os:${{ github.sha }} \
            apps/lantern-garage/
          echo "✓ Docker image built"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to Amazon ECR
        run: |
          echo "[2/4] Pushing image to ECR..."
          docker push 528081867536.dkr.ecr.us-east-1.amazonaws.com/lantern-os:${{ github.sha }}
          echo "✓ Image pushed: 528081867536.dkr.ecr.us-east-1.amazonaws.com/lantern-os:${{ github.sha }}"

      - name: Update ECS service
        run: |
          echo "[3/4] Updating ECS service..."
          aws ecs update-service \
            --cluster lantern-cluster \
            --service lantern-service \
            --force-new-deployment \
            --region us-east-1
          echo "✓ ECS service updated"

      - name: Wait for service stability
        run: |
          echo "[4/4] Waiting for service stability..."
          aws ecs wait services-stable \
            --cluster lantern-cluster \
            --services lantern-service \
            --region us-east-1
          echo "✓ Service is stable"

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ Deployed to AWS ECS Fargate"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Image: 528081867536.dkr.ecr.us-east-1.amazonaws.com/lantern-os:${{ github.sha }}"
          echo "Cluster: lantern-cluster"
          echo "Service: lantern-service"
          echo ""
          echo "Current status: LIVE ✓"
