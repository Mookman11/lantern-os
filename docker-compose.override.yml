version: '3.9'

services:
  lantern-unified:
    environment:
      FLASK_ENV: development
      LANTERN_MODE: local-dev
    volumes:
      - ./skills/dream_journal:/app/skills/dream_journal
      - ./data/dream_journal:/app/data/dream_journal

  dream-journal:
    build:
      context: .
      dockerfile: Dockerfile.dream-journal
    container_name: lantern-dream-journal-dev
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      PYTHONUNBUFFERED: 1
      LANTERN_MODE: dream-journal-local-dev
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./skills/dream_journal:/app/skills/dream_journal
      - ./data/dream_journal:/app/data/dream_journal
      - ./data/dreams:/app/data/dreams
    restart: unless-stopped
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: lantern-dream-ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
