<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" no-store">
  <title>Lantern — Dream Journal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f1419;
      color: #e0e0e0;
      line-height: 1.6;
      padding: 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid #333;
      padding-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #e8a73d;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
    }

    section {
      margin-bottom: 2rem;
    }

    section > h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #ccc;
      border-bottom: 1px solid #222;
      padding-bottom: 0.5rem;
    }

    form {
      background: #1a1f28;
      padding: 1rem;
      border-radius: 6px;
      border: 1px solid #333;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      color: #aaa;
    }

    textarea, input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 0.5rem;
      background: #0f1419;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.95rem;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: #e8a73d;
      box-shadow: 0 0 0 2px rgba(232, 167, 61, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      background: #e8a73d;
      color: #0f1419;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    button:hover {
      background: #f0b84f;
    }

    button:active {
      background: #d99629;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: #1a1f28;
      padding: 1rem;
      border-radius: 6px;
      border: 1px solid #333;
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: #e8a73d;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .entries {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .entry {
      background: #1a1f28;
      padding: 1rem;
      border-radius: 6px;
      border-left: 3px solid #e8a73d;
    }

    .entry-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }

    .entry-kind {
      background: #222;
      color: #e8a73d;
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .entry-time {
      color: #666;
    }

    .entry-text {
      color: #ccc;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .entry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.8rem;
    }

    .tag {
      background: #222;
      color: #999;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
    }

    .empty-state {
      text-align: center;
      color: #666;
      padding: 2rem;
      background: #1a1f28;
      border-radius: 6px;
      border: 1px dashed #333;
    }

    .message {
      padding: 0.8rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .message.success {
      background: rgba(46, 125, 50, 0.2);
      color: #81c784;
      border-left: 3px solid #81c784;
    }

    .message.error {
      background: rgba(198, 40, 40, 0.2);
      color: #ef5350;
      border-left: 3px solid #ef5350;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔆 Lantern</h1>
      <p class="subtitle">Dream Journal — Local, Private, Always Yours</p>
    </header>

    <div id="message"></div>

    <section id="stats-section">
      <h2>Your Journal</h2>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total Entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="dreamCount">0</div>
          <div class="stat-label">Dreams</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="noteCount">0</div>
          <div class="stat-label">Notes</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="avgLucidity">--</div>
          <div class="stat-label">Avg Lucidity</div>
        </div>
      </div>
    </section>

    <section id="form-section">
      <h2>New Entry</h2>
      <form id="entryForm">
        <div class="form-group">
          <label for="kind">Type</label>
          <select id="kind" name="kind">
            <option value="dream">Dream</option>
            <option value="note">Note</option>
            <option value="symbol">Symbol</option>
            <option value="reflection">Reflection</option>
          </select>
        </div>

        <div class="form-group">
          <label for="text">What do you want to remember?</label>
          <textarea id="text" name="text" placeholder="Write freely. What was vivid? What mattered? What surprised you?" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="emotions">How did it feel? (comma-separated)</label>
            <input type="text" id="emotions" name="emotions" placeholder="e.g., clarity, wonder, peace">
          </div>
          <div class="form-group">
            <label for="lucidity">Lucidity (0 = asleep, 1 = awake)</label>
            <input type="number" id="lucidity" name="lucidity" min="0" max="1" step="0.1" value="0.5">
          </div>
        </div>

        <div class="form-group">
          <label for="tags">Tags (comma-separated)</label>
          <input type="text" id="tags" name="tags" placeholder="e.g., lantern, learning, home">
        </div>

        <button type="submit">Save Entry</button>
      </form>
    </section>

    <section id="entries-section">
      <h2>Recent Entries</h2>
      <div class="entries" id="entriesList"></div>
    </section>
  </div>

  <script>
    const API = {
      create: async (data) => {
        const res = await fetch('/api/dream/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      },

      stats: async () => {
        const res = await fetch('/api/dream/stats');
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }
    };

    function showMessage(text, type = 'success') {
      const el = document.getElementById('message');
      el.className = `message ${type}`;
      el.textContent = text;
      el.style.display = 'block';
      if (type === 'success') setTimeout(() => el.style.display = 'none', 3000);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      if (d.toDateString() === today.toDateString()) {
        return `Today at ${d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
      } else if (d.toDateString() === yesterday.toDateString()) {
        return `Yesterday at ${d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
      } else {
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
    }

    function renderEntries(stats) {
      if (!stats || stats.total_entries === 0) {
        document.getElementById('entriesList').innerHTML = '<div class="empty-state">No entries yet. Start with your first dream or note.</div>';
        return;
      }
      // Stats display only for now; entries loaded on demand
      document.getElementById('entriesList').innerHTML = '<p style="color: #666; text-align: center;">Entries are saved locally in your journal.</p>';
    }

    async function loadStats() {
      try {
        const stats = await API.stats();
        document.getElementById('totalCount').textContent = stats.total_entries || 0;
        document.getElementById('dreamCount').textContent = stats.entries_by_kind?.dream || 0;
        document.getElementById('noteCount').textContent = stats.entries_by_kind?.note || 0;
        const avg = stats.avg_lucidity ? parseFloat(stats.avg_lucidity).toFixed(2) : '--';
        document.getElementById('avgLucidity').textContent = avg;
        renderEntries(stats);
      } catch (error) {
        console.error('Failed to load stats:', error);
      }
    }

    document.getElementById('entryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const emotions = document.getElementById('emotions').value
          .split(',').map(s => s.trim()).filter(Boolean);
        const tags = document.getElementById('tags').value
          .split(',').map(s => s.trim()).filter(Boolean);

        const data = {
          kind: document.getElementById('kind').value,
          text: document.getElementById('text').value,
          emotions,
          tags,
          lucidity: parseFloat(document.getElementById('lucidity').value) || 0.5
        };

        await API.create(data);
        showMessage('✓ Entry saved to your journal');
        document.getElementById('entryForm').reset();
        document.getElementById('lucidity').value = 0.5;
        await loadStats();
      } catch (error) {
        showMessage(`Error: ${error.message}`, 'error');
      }
    });

    // Load stats on page load
    loadStats();
    // Refresh stats every 10 seconds
    setInterval(loadStats, 10000);
  </script>
</body>
</html>
