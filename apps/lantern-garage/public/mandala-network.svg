<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .ring { transform-origin: 100px 100px; }
      .ring-12 { animation: spin 24s linear infinite; }
      .ring-9 { animation: spin 18s linear infinite; }
      .ring-6 { animation: spin 12s linear infinite; }
      .ring-3 { animation: spin 8s linear infinite; }
    </style>
  </defs>

  <!-- Ring 4: 12 dots (outermost, slowest) -->
  <g class="ring ring-12" filter="url(#glow)">
    <circle cx="100" cy="20" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="130" cy="30" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="151" cy="49" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="160" cy="75" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="160" cy="100" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="160" cy="125" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="151" cy="151" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="130" cy="170" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="100" cy="180" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="70" cy="170" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="49" cy="151" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="40" cy="125" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="40" cy="100" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="40" cy="75" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="49" cy="49" r="3" fill="currentColor" opacity="0.9"/>
    <circle cx="70" cy="30" r="3" fill="currentColor" opacity="0.9"/>

    <!-- 12-ring connections -->
    <line x1="100" y1="20" x2="130" y2="30" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="130" y1="30" x2="151" y2="49" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="151" y1="49" x2="160" y2="75" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="160" y1="75" x2="160" y2="100" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="160" y1="100" x2="160" y2="125" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="160" y1="125" x2="151" y2="151" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="151" y1="151" x2="130" y2="170" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="130" y1="170" x2="100" y2="180" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="100" y1="180" x2="70" y2="170" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="70" y1="170" x2="49" y2="151" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="49" y1="151" x2="40" y2="125" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="40" y1="125" x2="40" y2="100" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="40" y1="100" x2="40" y2="75" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="40" y1="75" x2="49" y2="49" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="49" y1="49" x2="70" y2="30" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
    <line x1="70" y1="30" x2="100" y2="20" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Ring 3: 9 dots -->
  <g class="ring ring-9" filter="url(#glow)">
    <circle cx="100" cy="35" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="135" cy="52" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="155" cy="85" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="155" cy="115" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="135" cy="148" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="100" cy="165" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="65" cy="148" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="45" cy="115" r="2.5" fill="currentColor" opacity="0.85"/>
    <circle cx="45" cy="85" r="2.5" fill="currentColor" opacity="0.85"/>

    <!-- 9-ring connections -->
    <line x1="100" y1="35" x2="135" y2="52" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="135" y1="52" x2="155" y2="85" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="155" y1="85" x2="155" y2="115" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="155" y1="115" x2="135" y2="148" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="135" y1="148" x2="100" y2="165" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="100" y1="165" x2="65" y2="148" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="65" y1="148" x2="45" y2="115" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="45" y1="115" x2="45" y2="85" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
    <line x1="45" y1="85" x2="100" y2="35" stroke="currentColor" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- Ring 2: 6 dots -->
  <g class="ring ring-6" filter="url(#glow)">
    <circle cx="100" cy="55" r="2" fill="currentColor" opacity="0.8"/>
    <circle cx="143" cy="75" r="2" fill="currentColor" opacity="0.8"/>
    <circle cx="143" cy="125" r="2" fill="currentColor" opacity="0.8"/>
    <circle cx="100" cy="145" r="2" fill="currentColor" opacity="0.8"/>
    <circle cx="57" cy="125" r="2" fill="currentColor" opacity="0.8"/>
    <circle cx="57" cy="75" r="2" fill="currentColor" opacity="0.8"/>

    <!-- 6-ring connections -->
    <line x1="100" y1="55" x2="143" y2="75" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
    <line x1="143" y1="75" x2="143" y2="125" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
    <line x1="143" y1="125" x2="100" y2="145" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
    <line x1="100" y1="145" x2="57" y2="125" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
    <line x1="57" y1="125" x2="57" y2="75" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
    <line x1="57" y1="75" x2="100" y2="55" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- Ring 1: 3 dots (innermost, fastest) -->
  <g class="ring ring-3" filter="url(#glow)">
    <circle cx="100" cy="75" r="1.8" fill="currentColor" opacity="0.95"/>
    <circle cx="125" cy="100" r="1.8" fill="currentColor" opacity="0.95"/>
    <circle cx="75" cy="100" r="1.8" fill="currentColor" opacity="0.95"/>

    <!-- 3-ring connections -->
    <line x1="100" y1="75" x2="125" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="125" y1="100" x2="75" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="75" y1="100" x2="100" y2="75" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Center hub -->
  <circle cx="100" cy="100" r="2" fill="currentColor" opacity="1" filter="url(#glow)"/>
</svg>