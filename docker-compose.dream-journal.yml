version: '3.9'

services:
  # Slim Dream Journal - Flask API only
  dream-journal:
    build:
      context: .
      dockerfile: Dockerfile.dream-journal
    container_name: lantern-dream-journal
    ports:
      - "5000:5000"      # Flask API
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      LANTERN_MODE: dream-journal-only
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./skills/dream_journal:/app/skills/dream_journal:ro
      - ./data/dreams:/app/data/dreams
      - lantern-logs:/app/logs
    restart: unless-stopped
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: lantern-dream-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  lantern-logs:
  ollama-data:

networks:
  default:
    name: lantern-network
